name: HR Reminders (birthdays & anniversaries)

on:
  schedule:
    # Запускається щодня о 08:00 за Києвом (05:00 UTC).
    # GitHub Actions працює в UTC, тому враховуйте зсув при зміні часу.
    - cron: "0 5 * * *"
  workflow_dispatch: {}  # дозволяє запустити вручну кнопкою "Run workflow"

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run reminders script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ADVANCE_DAYS: "3"  # за скільки днів попереджати завчасно
          # Розкоментуйте наступний рядок, якщо синхронізуєтесь з PeopleForce
          # PEOPLEFORCE_API_KEY: ${{ secrets.PEOPLEFORCE_API_KEY }}
        run: python3 reminders.py
